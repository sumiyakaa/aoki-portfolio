  </nav>

  <main>

    <!-- ========== FV — 100vh ========== -->
    <section class="contact-fv" aria-label="ファーストビュー">
      <div class="contact-fv__bg">
        <div class="contact-fv__grain" aria-hidden="true"></div>
        <div class="contact-fv__scanline" aria-hidden="true"></div>
      </div>
      <div class="contact-fv__content">
        <h1 class="contact-fv__title">CONTACT</h1>
        <p class="contact-fv__sub">お気軽にご相談ください</p>
        <div class="contact-fv__hr" aria-hidden="true"></div>
      </div>
      <div class="contact-fv__edge contact-fv__edge--bl">
        <span class="contact-fv__edge-text">CONTACT</span>
      </div>
      <div class="contact-fv__edge contact-fv__edge--br">
        <span class="contact-fv__edge-text">SCROLL</span>
      </div>
    </section>

    <!-- ========== フォームセクション（白背景） ========== -->
    <section class="contact-form-section" aria-label="お問い合わせフォーム">
      <div class="contact-form__inner">

        <form id="contact-form" class="contact-form" action="https://formspree.io/f/xdkwllne" method="POST" novalidate>

          <!-- お名前 -->
          <div class="contact-form__field">
            <label for="contact-name" class="contact-form__label">NAME<span class="contact-form__required">*</span></label>
            <input type="text" id="contact-name" name="name" class="contact-form__input" placeholder="お名前をご記入ください" required autocomplete="name">
            <span class="contact-form__error" aria-live="polite"></span>
          </div>

          <!-- メールアドレス -->
          <div class="contact-form__field">
            <label for="contact-email" class="contact-form__label">EMAIL<span class="contact-form__required">*</span></label>
            <input type="email" id="contact-email" name="email" class="contact-form__input" placeholder="example@email.com" required autocomplete="email">
            <span class="contact-form__error" aria-live="polite"></span>
          </div>

          <!-- ご予算 -->
          <div class="contact-form__field">
            <label for="contact-budget" class="contact-form__label">BUDGET</label>
            <div class="contact-form__select-wrap">
              <select id="contact-budget" name="budget" class="contact-form__select">
                <option value="" disabled selected>選択してください</option>
                <option value="〜10万円">〜10万円</option>
                <option value="10万円〜20万円">10万円〜20万円</option>
                <option value="20万円〜30万円">20万円〜30万円</option>
                <option value="30万円〜50万円">30万円〜50万円</option>
                <option value="50万円〜">50万円〜</option>
                <option value="未定・相談したい">未定・相談したい</option>
              </select>
            </div>
          </div>

          <!-- ご希望納期 -->
          <div class="contact-form__field">
            <label for="contact-deadline" class="contact-form__label">DEADLINE</label>
            <div class="contact-form__select-wrap">
              <select id="contact-deadline" name="deadline" class="contact-form__select">
                <option value="" disabled selected>選択してください</option>
                <option value="1ヶ月以内">1ヶ月以内</option>
                <option value="1〜2ヶ月">1〜2ヶ月</option>
                <option value="2〜3ヶ月">2〜3ヶ月</option>
                <option value="3ヶ月以上">3ヶ月以上</option>
                <option value="未定・相談したい">未定・相談したい</option>
              </select>
            </div>
          </div>

          <!-- ご相談内容 -->
          <div class="contact-form__field">
            <label for="contact-message" class="contact-form__label">MESSAGE<span class="contact-form__required">*</span></label>
            <textarea id="contact-message" name="message" class="contact-form__textarea" placeholder="ご相談内容をご記入ください" rows="6" required></textarea>
            <span class="contact-form__error" aria-live="polite"></span>
          </div>

          <!-- 送信ボタン -->
          <button type="submit" class="contact-form__submit">SEND →</button>

        </form>

        <!-- 送信完了 -->
        <div id="contact-thanks" class="contact-thanks" style="display:none;">
          <h2 class="contact-thanks__title">THANK YOU.</h2>
          <p class="contact-thanks__text">お問い合わせを受け付けました。<br>2営業日以内にご返信いたします。</p>
        </div>

      </div>
    </section>
